<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#F46397" id="meta-theme-color" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>دردشاتي - عالمك للتواصل</title>
    <meta name="description" content="دردشاتي - تطبيق دردشة عربي حديث." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cairo:wght@400;700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

    <style>
      :root {
        --primary: #585752;
        --background: #F46397;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--background);
        font-family: 'Cairo', 'Tajawal', sans-serif;
        overflow-x: hidden;
      }

      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--background);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- شاشة التحميل الأولية -->
    <div id="initial-loader">
      <div class="spinner"></div>
    </div>

    <div id="root"></div>
    
    <!-- ✅ التعديل الجوهري: إضافة النقطة لضمان الربط الصحيح في الإنتاج -->
    <script type="module" src="./src/main.tsx"></script>

    <script>
      // جعل الأخطاء تظهر في الـ Console للتشخيص
      window.onerror = function(msg, url, linenumber) {
        console.error('Runtime Error:', msg, '\nFile:', url, '\nLine:', linenumber);
        return false; 
      };

      // إخفاء الـ loader
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 500);
          }, 300);
        }
      });
    </script> 
  </body>
</html>
